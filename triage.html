<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSYCHOPOLITICA — Triage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700;900&family=PT+Serif:ital,wght@0,400;0,700;1,400&family=Old+Standard+TT:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #fff;
    --creme: #f7f3ef;
    --red: #c41e1e;
    --ink: #1a1a1a;
    --green: #27ae60;
    --yellow: #f39c12;
    --gray: #6b6560;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'PT Serif', 'Georgia', serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.6;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 0 1.5rem 2rem; }

  /* Header */
  header {
    text-align: center;
    padding: 1.5rem 0 0.75rem;
    border-bottom: 2px solid var(--ink);
    margin-bottom: 0;
  }
  header h1 {
    font-family: 'Cormorant Garamond', 'Georgia', serif;
    font-size: 2.5rem;
    font-weight: 900;
    letter-spacing: 0.15em;
    color: var(--red);
    text-transform: uppercase;
  }
  header .subtitle {
    font-family: 'Old Standard TT', 'Georgia', serif;
    font-size: 0.85rem;
    font-style: italic;
    color: var(--gray);
  }
  header .stats {
    margin-top: 0.4rem;
    font-size: 0.75rem;
    color: var(--gray);
    font-family: 'Old Standard TT', 'Georgia', serif;
  }

  /* Tabs */
  .tabs {
    display: flex;
    border-bottom: 1px solid #ddd;
    margin-bottom: 0;
  }
  .tab {
    font-family: 'Old Standard TT', 'Georgia', serif;
    font-size: 0.8rem;
    letter-spacing: 0.06em;
    padding: 0.6rem 1.25rem;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    color: var(--gray);
    transition: color 0.15s, border-color 0.15s;
    text-transform: uppercase;
  }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--ink); border-bottom-color: var(--red); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.6rem 0;
    border-bottom: 1px solid #ddd;
    flex-wrap: wrap;
  }
  .toolbar-btn {
    background: var(--ink);
    color: #fff;
    border: none;
    padding: 0.4rem 1rem;
    font-family: 'Old Standard TT', 'Georgia', serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: opacity 0.15s, background 0.15s;
    text-transform: uppercase;
    min-width: 5rem;
    text-align: center;
  }
  .toolbar-btn:hover:not(:disabled) { opacity: 0.85; }
  .toolbar-btn:disabled { opacity: 0.35; cursor: default; }
  .toolbar-btn.running { background: var(--yellow); color: var(--ink); }
  .toolbar-btn.success { background: var(--green); }
  .toolbar-btn.error { background: var(--red); }
  .toolbar-btn.review-btn { background: var(--red); }
  .toolbar-btn.send-btn { background: var(--green); }
  .toolbar-spacer { flex: 1; }
  .toolbar-status {
    font-family: 'Old Standard TT', 'Georgia', serif;
    font-size: 0.75rem;
    color: var(--gray);
    flex-basis: 100%;
    margin-top: 0.25rem;
  }
  .toolbar-status:empty { display: none; }
  .toolbar-status .err { color: var(--red); }

  /* Counts bar */
  .counts-bar {
    font-family: 'Old Standard TT', 'Georgia', serif;
    font-size: 0.75rem;
    color: var(--gray);
    padding: 0.4rem 0;
    border-bottom: 1px solid #eee;
  }
  .counts-bar b { color: var(--ink); }

  /* Section header */
  .section-header {
    font-family: 'Cormorant Garamond', 'Georgia', serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin: 1.25rem 0 0.5rem;
    padding-bottom: 0.3rem;
    border-bottom: 2px solid var(--ink);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .section-header .count {
    font-family: 'Old Standard TT', 'Georgia', serif;
    font-size: 0.7rem;
    font-weight: 400;
    color: var(--gray);
    text-transform: none;
    letter-spacing: 0;
  }

  /* Card */
  .card {
    background: var(--creme);
    border-left: 3px solid transparent;
    padding: 0.6rem 0.9rem;
    margin-bottom: 0.3rem;
    transition: box-shadow 0.15s, border-color 0.15s, opacity 0.15s;
    position: relative;
  }
  .card:hover { box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .card.accepted { border-left-color: var(--green); }
  .card.rejected { border-left-color: var(--red); opacity: 0.4; }
  .card.rejected:hover { opacity: 0.65; }
  .card.maybe { border-left-color: var(--yellow); }
  .card.promoted { border-left-color: var(--green); background: #f2faf2; }

  .card-headline {
    font-family: 'PT Serif', 'Georgia', serif;
    font-size: 0.95rem;
    font-weight: 400;
    line-height: 1.4;
    cursor: text;
    padding: 1px 3px;
    margin: -1px -3px;
    border: 1px solid transparent;
    transition: border-color 0.15s;
  }
  .card-headline:hover { border-color: #ddd; }
  .card-headline:focus { outline: none; border-color: var(--red); background: #fff; }
  .card-headline-ru {
    font-family: 'PT Serif', 'Georgia', serif;
    font-size: 0.8rem;
    color: var(--gray);
    font-style: italic;
    margin-top: 0.1rem;
  }

  .card-meta {
    font-family: 'Old Standard TT', 'Georgia', serif;
    font-size: 0.72rem;
    color: var(--gray);
    margin-top: 0.2rem;
    display: flex;
    gap: 0.6rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .card-meta .source { font-weight: 700; color: var(--ink); }
  .card-meta .slug { font-family: monospace; font-size: 0.65rem; color: #aaa; }
  .card-meta a { color: var(--gray); text-decoration: none; }
  .card-meta a:hover { color: var(--red); }

  .card-ai-notes {
    font-family: 'Old Standard TT', 'Georgia', serif;
    font-size: 0.7rem;
    font-style: italic;
    color: var(--gray);
    margin-top: 0.2rem;
    padding-left: 0.4rem;
    border-left: 2px solid #e0dcd0;
    line-height: 1.4;
  }

  /* AI response from review */
  .card-ai-response {
    font-family: 'Old Standard TT', 'Georgia', serif;
    font-size: 0.72rem;
    color: var(--green);
    margin-top: 0.2rem;
    padding: 0.3rem 0.4rem;
    background: #f4faf4;
    border-left: 2px solid var(--green);
    line-height: 1.4;
  }

  /* Notes history */
  .notes-history {
    margin-top: 0.2rem;
    font-size: 0.68rem;
    color: var(--gray);
  }
  .notes-history .nh-editor { font-style: italic; }
  .notes-history .nh-ai { color: var(--green); margin-left: 0.5rem; }
  .notes-history details { margin-bottom: 0.15rem; }
  .notes-history summary {
    cursor: pointer;
    font-family: 'Old Standard TT', 'Georgia', serif;
    font-size: 0.65rem;
    color: #bbb;
  }

  /* Buttons */
  .card-actions {
    display: flex;
    gap: 0.25rem;
    margin-top: 0.35rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .btn {
    border: 1px solid #d5d0c4;
    background: var(--paper);
    padding: 0.15rem 0.45rem;
    font-family: 'Old Standard TT', 'Georgia', serif;
    font-size: 0.65rem;
    cursor: pointer;
    transition: all 0.1s;
  }
  .btn:hover { background: #f5f0e8; }
  .btn-accept { color: var(--green); }
  .btn-accept:hover, .btn-accept.active { background: var(--green); color: #fff; border-color: var(--green); }
  .btn-reject { color: var(--red); }
  .btn-reject:hover, .btn-reject.active { background: var(--red); color: #fff; border-color: var(--red); }
  .btn-maybe { color: var(--yellow); }
  .btn-maybe:hover, .btn-maybe.active { background: var(--yellow); color: #fff; border-color: var(--yellow); }
  .btn-featured { color: var(--red); font-weight: 700; }
  .btn-featured.active { background: var(--red); color: #fff; border-color: var(--red); }
  .btn-promote { color: var(--green); }
  .btn-promote:hover { background: var(--green); color: #fff; border-color: var(--green); }

  /* Editor notes */
  .card-editor-notes { margin-top: 0.3rem; }
  .card-editor-notes textarea {
    width: 100%;
    min-height: 1.8rem;
    padding: 0.3rem 0.4rem;
    border: 1px solid #d5d0c4;
    font-family: 'PT Serif', 'Georgia', serif;
    font-size: 0.72rem;
    resize: vertical;
    background: var(--paper);
  }
  .card-editor-notes textarea:focus { outline: none; border-color: var(--red); }
  .card-editor-notes label {
    font-family: 'Old Standard TT', 'Georgia', serif;
    font-size: 0.6rem;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
    align-items: center;
  }
  .filter-bar input {
    flex: 1;
    padding: 0.3rem 0.5rem;
    border: 1px solid #d5d0c4;
    font-family: 'PT Serif', 'Georgia', serif;
    font-size: 0.75rem;
    background: var(--paper);
  }
  .filter-bar input:focus { outline: none; border-color: var(--red); }
  .filter-bar select {
    padding: 0.3rem 0.5rem;
    border: 1px solid #d5d0c4;
    font-family: 'Old Standard TT', 'Georgia', serif;
    font-size: 0.75rem;
    background: var(--paper);
  }

  .empty-state {
    text-align: center;
    padding: 2rem;
    color: var(--gray);
    font-family: 'Old Standard TT', 'Georgia', serif;
    font-size: 0.85rem;
    font-style: italic;
  }

  /* Locked overlay */
  .locked-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255, 255, 255, 0.85);
    z-index: 150;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 1rem;
  }
  .locked-overlay.active { display: flex; }
  .locked-overlay .lock-msg {
    font-family: 'Old Standard TT', 'Georgia', serif;
    font-size: 0.95rem;
    color: var(--gray);
    text-align: center;
    line-height: 1.6;
  }
  .locked-overlay .lock-msg .spinner {
    display: inline-block;
    width: 1.2rem;
    height: 1.2rem;
    border: 2px solid #ddd;
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 0.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Archive styles */
  .archive-section { margin-top: 1rem; }
  .archive-row {
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    padding: 0.3rem 0;
    border-bottom: 1px solid #f0ece4;
    font-size: 0.8rem;
  }
  .archive-row:last-child { border-bottom: none; }
  .archive-row .ar-source {
    font-family: 'Old Standard TT', 'Georgia', serif;
    font-weight: 700;
    font-size: 0.7rem;
    color: var(--gray);
    min-width: 5rem;
  }
  .archive-row .ar-headline { flex: 1; font-family: 'PT Serif', 'Georgia', serif; }
  .archive-row .ar-section {
    font-family: 'Old Standard TT', 'Georgia', serif;
    font-size: 0.65rem;
    color: #bbb;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .archive-row.featured .ar-headline { font-weight: 700; }
  .archive-row.rejected-row { color: #aaa; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: #fff;
    padding: 0.4rem 1.25rem;
    font-family: 'Old Standard TT', 'Georgia', serif;
    font-size: 0.8rem;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 200;
  }
  .toast.show { opacity: 1; }

  .kbd-hint {
    position: fixed;
    bottom: 0.75rem;
    right: 1rem;
    font-family: 'Old Standard TT', 'Georgia', serif;
    font-size: 0.6rem;
    color: #ccc;
  }
  kbd {
    background: #f5f0e8;
    border: 1px solid #d5d0c4;
    padding: 0 0.25rem;
    font-family: inherit;
    font-size: 0.6rem;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>PSYCHOPOLITICA</h1>
    <div class="subtitle">Editorial Triage</div>
    <div class="stats" id="header-stats"></div>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('triage')">Triage</div>
    <div class="tab" onclick="switchTab('archive')">Archive</div>
  </div>

  <!-- TRIAGE TAB -->
  <div class="tab-panel active" id="tab-triage">
    <div class="toolbar">
      <button class="toolbar-btn" id="scan-btn" onclick="scanAndFilter()">SCAN</button>
      <button class="toolbar-btn review-btn" id="review-btn" onclick="review()">REVIEW</button>
      <div class="toolbar-spacer"></div>
      <button class="toolbar-btn send-btn" id="send-btn" onclick="send()">SEND</button>
      <button class="toolbar-btn" id="build-btn" onclick="build()" style="background:var(--gray)">BUILD</button>
      <span class="toolbar-status" id="toolbar-status"></span>
    </div>

    <div class="counts-bar" id="counts-bar"></div>

    <div class="section-header">
      Stories <span class="count" id="stories-count"></span>
    </div>
    <div id="stories-list"></div>

    <div class="section-header" style="margin-top: 2rem;">
      More Candidates <span class="count" id="candidates-count"></span>
    </div>
    <div class="filter-bar">
      <input type="text" id="filter-input" placeholder="Filter by keyword..." oninput="renderCandidates()">
      <select id="filter-source" onchange="renderCandidates()">
        <option value="">All sources</option>
      </select>
    </div>
    <div id="candidates-list"></div>
  </div>

  <!-- ARCHIVE TAB -->
  <div class="tab-panel" id="tab-archive">
    <div class="section-header" style="margin-top:1rem;">Published <span class="count" id="pub-count"></span></div>
    <div id="published-list" class="archive-section"></div>

    <div class="section-header" style="margin-top:1.5rem;">Rejected <span class="count" id="rej-count"></span></div>
    <div id="rejected-list" class="archive-section"></div>
  </div>
</div>

<div class="locked-overlay" id="locked-overlay">
  <div class="lock-msg" id="lock-msg">
    <span class="spinner"></span> Processing editor feedback...
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="kbd-hint"><kbd>a</kbd> accept <kbd>r</kbd> reject <kbd>m</kbd> maybe <kbd>f</kbd> feature <kbd>n</kbd> notes <kbd>↑↓</kbd> nav</div>

<script>
let data = { selected: [], candidates: [] };
let focusedCard = null;

// ── Init ──────────────────────────────────────────────────────────────

async function init() {
  try {
    const resp = await fetch('/api/candidates');
    data = await resp.json();
  } catch (e) {
    console.error('Failed to load:', e);
    return;
  }

  data.selected.forEach((s, i) => {
    if (!s.status) s.status = 'pending';
    if (s.order === undefined) s.order = i;
    if (!s.editor_notes) s.editor_notes = '';
  });
  data.candidates.forEach(s => {
    if (!s.status) s.status = 'pending';
    if (!s.editor_notes) s.editor_notes = '';
  });

  if (data.selected.length === 0 && data.candidates.length === 0) {
    document.getElementById('header-stats').innerHTML =
      'No data loaded. Click <b>SCAN</b> to get started.';
  } else {
    document.getElementById('header-stats').innerHTML =
      `${data.date || 'Today'} · ${data.feeds_fetched || '?'} feeds · ${data.total_items || '?'} items`;
  }

  // Populate source filter
  const sources = new Set();
  [...data.selected, ...data.candidates].forEach(s => {
    if (s.source_name) sources.add(s.source_name);
  });
  const sel = document.getElementById('filter-source');
  sel.innerHTML = '<option value="">All sources</option>';
  [...sources].sort().forEach(src => {
    const opt = document.createElement('option');
    opt.value = src; opt.textContent = src;
    sel.appendChild(opt);
  });

  renderAll();
}

// ── Rendering ─────────────────────────────────────────────────────────

function renderAll() {
  renderStories();
  renderCandidates();
  updateCounts();
}

function renderStories() {
  const list = document.getElementById('stories-list');
  // Hide rejected stories — they go to the Archive tab
  const visible = data.selected.filter(s => s.status !== 'rejected');
  const rejected = data.selected.filter(s => s.status === 'rejected').length;
  if (visible.length === 0) {
    list.innerHTML = '<div class="empty-state">No stories yet. Click SCAN to fetch and filter feeds.</div>';
  } else {
    list.innerHTML = visible.map((s, i) => cardHTML(s, i, 'stories')).join('');
  }
  const a = visible.filter(s => s.status === 'accepted').length;
  const p = visible.filter(s => s.status === 'pending' || s.status === 'maybe').length;
  document.getElementById('stories-count').textContent =
    `(${a} ✓ · ${p} ? · ${rejected} cut → Archive)`;
}

function renderCandidates() {
  const list = document.getElementById('candidates-list');
  const kw = document.getElementById('filter-input').value.toLowerCase();
  const src = document.getElementById('filter-source').value;

  let items = data.candidates.filter(s => {
    if (kw && !s.headline.toLowerCase().includes(kw) &&
        !(s.source_name || '').toLowerCase().includes(kw) &&
        !(s.headline_ru || '').toLowerCase().includes(kw)) return false;
    if (src && s.source_name !== src) return false;
    return true;
  });

  list.innerHTML = items.map((s, i) => cardHTML(s, i, 'candidates')).join('');
  document.getElementById('candidates-count').textContent =
    `(${items.length}${items.length !== data.candidates.length ? ' filtered' : ''} of ${data.candidates.length})`;
}

function updateCounts() {
  const a = data.selected.filter(s => s.status === 'accepted').length;
  const p = data.selected.filter(s => s.status === 'pending' || s.status === 'maybe').length;
  const r = data.selected.filter(s => s.status === 'rejected').length;
  const f = data.selected.filter(s => s.featured).length;
  const hasNotes = data.selected.filter(s => (s.editor_notes || '').trim()).length;
  document.getElementById('counts-bar').innerHTML =
    `<b>${a}</b> accepted · <b>${p}</b> pending · <b>${r}</b> cut · <b>${f}</b> featured` +
    (hasNotes ? ` · <b>${hasNotes}</b> with notes` : '');
}

// ── Card HTML ─────────────────────────────────────────────────────────

function cardHTML(story, index, section) {
  const isStories = section === 'stories';
  const cls = story.status === 'accepted' ? 'accepted' :
              story.status === 'rejected' ? 'rejected' :
              story.status === 'maybe' ? 'maybe' :
              story.promoted ? 'promoted' : '';

  const ruLine = story.headline_ru
    ? `<div class="card-headline-ru">${esc(story.headline_ru)}</div>` : '';
  const slug = story.id ? `<span class="slug">[${esc(story.id)}]</span>` : '';
  const link = story.source_url
    ? `<a href="${esc(story.source_url)}" target="_blank">↗</a>` : '';
  const ai = story.notes
    ? `<div class="card-ai-notes">${esc(story.notes)}</div>` : '';

  // AI review response
  const aiResp = story.ai_response
    ? `<div class="card-ai-response">${esc(story.ai_response)}</div>` : '';

  // Notes history
  let historyHTML = '';
  if (story.notes_history && story.notes_history.length > 0) {
    const entries = story.notes_history.map(h => {
      if (typeof h === 'string') return `<div class="nh-editor">${esc(h)}</div>`;
      return `<div><span class="nh-editor">${esc(h.editor || '')}</span><span class="nh-ai">${esc(h.ai || '')}</span></div>`;
    }).join('');
    historyHTML = `<div class="notes-history"><details><summary>Previous notes</summary>${entries}</details></div>`;
  }

  const actions = isStories ? `
    <button class="btn btn-accept ${story.status === 'accepted' ? 'active' : ''}"
            onclick="event.stopPropagation(); setStatus('${esc(story.id)}', 'accepted')">✓</button>
    <button class="btn btn-reject ${story.status === 'rejected' ? 'active' : ''}"
            onclick="event.stopPropagation(); setStatus('${esc(story.id)}', 'rejected')">✗</button>
    <button class="btn btn-maybe ${story.status === 'maybe' ? 'active' : ''}"
            onclick="event.stopPropagation(); setStatus('${esc(story.id)}', 'maybe')">?</button>
    <button class="btn btn-featured ${story.featured ? 'active' : ''}"
            onclick="event.stopPropagation(); toggleFeatured('${esc(story.id)}')">◆</button>
  ` : `
    <button class="btn btn-promote" onclick="event.stopPropagation(); promote(${index})">↑ Promote</button>
    <button class="btn btn-reject ${story.status === 'rejected' ? 'active' : ''}"
            onclick="event.stopPropagation(); setCandidateStatus(${index}, 'rejected')">✗ Skip</button>
  `;

  return `
    <div class="card ${cls}" data-section="${section}" data-index="${index}"
         data-id="${esc(story.id || '')}" onclick="focusCard(this)">
      <div class="card-headline" contenteditable="true"
           onblur="updateHeadline('${esc(story.id)}', this)"
           onclick="event.stopPropagation()">${esc(story.headline)}</div>
      ${ruLine}
      <div class="card-meta">
        <span class="source">${esc(story.source_name || '')}</span>
        <span>${esc(story.pub_date || '')}</span>
        ${slug} ${link}
      </div>
      ${ai}${aiResp}${historyHTML}
      <div class="card-actions">${actions}</div>
      <div class="card-editor-notes">
        <label>Notes</label>
        <textarea placeholder="Feedback, instructions..."
                  onclick="event.stopPropagation()"
                  oninput="updateEditorNotes('${esc(story.id)}', this.value)">${esc(story.editor_notes || '')}</textarea>
      </div>
    </div>`;
}

function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ── Data operations ───────────────────────────────────────────────────

function findStory(id) { return data.selected.find(s => s.id === id); }

function setStatus(id, status) {
  const s = findStory(id);
  if (!s) return;
  s.status = s.status === status ? 'pending' : status;
  if (s.status === 'accepted' && s.order === undefined) s.order = data.selected.filter(x => x.status === 'accepted').length;
  renderAll();
}

function toggleFeatured(id) {
  const s = findStory(id);
  if (s) { s.featured = !s.featured; renderAll(); }
}

function updateHeadline(id, el) {
  const s = findStory(id) || data.candidates.find(x => x.id === id);
  if (!s) return;
  const txt = el.textContent.trim();
  if (txt && txt !== s.headline) {
    if (!s.original_headline) s.original_headline = s.headline;
    s.headline = txt;
  }
}

function updateEditorNotes(id, val) {
  const s = findStory(id) || data.candidates.find(x => x.id === id);
  if (s) s.editor_notes = val;
}

function setCandidateStatus(index, status) {
  const kw = document.getElementById('filter-input').value.toLowerCase();
  const src = document.getElementById('filter-source').value;
  const filtered = data.candidates.filter(s => {
    if (kw && !s.headline.toLowerCase().includes(kw) && !(s.source_name || '').toLowerCase().includes(kw)) return false;
    if (src && s.source_name !== src) return false;
    return true;
  });
  const s = filtered[index];
  if (s) { s.status = s.status === status ? 'pending' : status; renderCandidates(); }
}

function promote(index) {
  const kw = document.getElementById('filter-input').value.toLowerCase();
  const src = document.getElementById('filter-source').value;
  const filtered = data.candidates.filter(s => {
    if (kw && !s.headline.toLowerCase().includes(kw) && !(s.source_name || '').toLowerCase().includes(kw)) return false;
    if (src && s.source_name !== src) return false;
    return true;
  });
  const story = filtered[index];
  if (!story) return;
  const ci = data.candidates.indexOf(story);
  if (ci >= 0) data.candidates.splice(ci, 1);
  story.status = 'pending';
  story.promoted = true;
  story.order = data.selected.length;
  if (!story.id) {
    story.id = story.headline.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 30);
  }
  data.selected.push(story);
  renderAll();
  toast('Promoted');
}

function focusCard(el) {
  document.querySelectorAll('.card').forEach(c => c.style.outline = '');
  el.style.outline = '2px solid var(--red)';
  focusedCard = el;
}

// ── Keyboard shortcuts ────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  if (!focusedCard) return;
  if (e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
  const id = focusedCard.dataset.id;
  const section = focusedCard.dataset.section;
  const index = parseInt(focusedCard.dataset.index);

  switch (e.key) {
    case 'a': if (id) setStatus(id, 'accepted'); break;
    case 'r':
      if (id) setStatus(id, 'rejected');
      else if (section === 'candidates') setCandidateStatus(index, 'rejected');
      break;
    case 'm': if (id) setStatus(id, 'maybe'); break;
    case 'f': if (id) toggleFeatured(id); break;
    case 'n':
      e.preventDefault();
      const ta = focusedCard.querySelector('textarea');
      if (ta) ta.focus();
      break;
    case 'ArrowDown': case 'ArrowUp':
      e.preventDefault();
      const cards = [...document.querySelectorAll('.card')];
      let cur = cards.indexOf(focusedCard);
      const next = cur + (e.key === 'ArrowDown' ? 1 : -1);
      if (next >= 0 && next < cards.length) {
        cards[next].click();
        cards[next].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
      break;
  }
});

// ── Tabs ──────────────────────────────────────────────────────────────

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab-panel#tab-${name}`).classList.add('active');
  event.target.classList.add('active');
  if (name === 'archive') loadArchive();
}

async function loadArchive() {
  try {
    const resp = await fetch('/api/archive');
    const arch = await resp.json();

    const pubList = document.getElementById('published-list');
    document.getElementById('pub-count').textContent = `(${arch.published.length})`;
    pubList.innerHTML = arch.published.length === 0
      ? '<div class="empty-state">No published stories</div>'
      : arch.published.map(s =>
          `<div class="archive-row ${s.featured ? 'featured' : ''}">
            <span class="ar-source">${esc(s.source)}</span>
            <span class="ar-headline">${s.featured ? '◆ ' : ''}${esc(s.headline)}</span>
            <span class="ar-section">${esc(s.section)}</span>
          </div>`).join('');

    const rejList = document.getElementById('rejected-list');
    document.getElementById('rej-count').textContent = `(${arch.rejected.length})`;
    rejList.innerHTML = arch.rejected.length === 0
      ? '<div class="empty-state">No rejected stories</div>'
      : arch.rejected.map(s =>
          `<div class="archive-row rejected-row">
            <span class="ar-source">${esc(s.source)}</span>
            <span class="ar-headline">${esc(s.headline)}</span>
          </div>`).join('');
  } catch (e) {
    console.error('Archive load failed:', e);
  }
}

// ── Actions ───────────────────────────────────────────────────────────

async function scanAndFilter() {
  const btn = document.getElementById('scan-btn');
  const status = document.getElementById('toolbar-status');
  btn.disabled = true;
  btn.classList.add('running');
  btn.textContent = 'SCANNING…';
  status.textContent = 'Fetching feeds and filtering…';

  try {
    const resp = await fetch('/api/scan-and-filter', { method: 'POST' });
    const result = await resp.json();
    if (result.ok) {
      btn.classList.remove('running');
      btn.classList.add('success');
      btn.textContent = 'DONE';
      status.textContent = `${result.selected_count} selected · ${result.candidates_count} candidates · ${result.model}`;
      await init();
      setTimeout(() => { btn.classList.remove('success'); btn.textContent = 'SCAN'; btn.disabled = false; }, 3000);
    } else {
      btn.classList.remove('running'); btn.classList.add('error'); btn.textContent = 'FAILED';
      status.innerHTML = `<span class="err">${esc(result.error)}</span>`;
      setTimeout(() => { btn.classList.remove('error'); btn.textContent = 'SCAN'; btn.disabled = false; }, 5000);
    }
  } catch (e) {
    btn.classList.remove('running'); btn.textContent = 'SCAN'; btn.disabled = false;
    status.innerHTML = `<span class="err">${esc(e.message)}</span>`;
  }
}

async function review() {
  const hasNotes = data.selected.some(s => (s.editor_notes || '').trim());
  if (!hasNotes) { toast('No editor notes to review'); return; }

  const overlay = document.getElementById('locked-overlay');
  const lockMsg = document.getElementById('lock-msg');
  overlay.classList.add('active');
  lockMsg.innerHTML = '<span class="spinner"></span> Processing editor feedback…';

  const btn = document.getElementById('review-btn');
  btn.disabled = true;

  try {
    // Send current state along with review request
    const payload = {
      date: data.date,
      selected: data.selected,
      candidates: data.candidates,
      feeds_fetched: data.feeds_fetched,
      total_items: data.total_items,
      new_count: data.new_count,
    };
    const resp = await fetch('/api/review', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload, null, 2),
    });
    const result = await resp.json();

    if (result.ok) {
      lockMsg.innerHTML = `✓ Processed ${result.reviewed} stories. Reloading…`;
      await init();
      setTimeout(() => { overlay.classList.remove('active'); }, 1000);
    } else {
      lockMsg.innerHTML = `<span style="color:var(--red)">Error: ${esc(result.error)}</span>`;
      setTimeout(() => { overlay.classList.remove('active'); }, 3000);
    }
  } catch (e) {
    lockMsg.innerHTML = `<span style="color:var(--red)">${esc(e.message)}</span>`;
    setTimeout(() => { overlay.classList.remove('active'); }, 3000);
  }

  btn.disabled = false;
}

async function send() {
  const output = {
    date: data.date,
    saved_at: new Date().toISOString(),
    selected: data.selected.map(s => ({
      id: s.id, headline: s.headline, headline_ru: s.headline_ru || '',
      original_headline: s.original_headline || '',
      source_name: s.source_name, source_url: s.source_url, pub_date: s.pub_date,
      featured: !!s.featured, status: s.status || 'pending',
      order: s.order || 0, notes: s.notes || '',
      editor_notes: s.editor_notes || '', promoted: !!s.promoted,
      ai_response: s.ai_response || '',
    })),
  };

  try {
    const resp = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(output, null, 2),
    });
    if (resp.ok) {
      const btn = document.getElementById('send-btn');
      btn.textContent = 'SENT ✓';
      setTimeout(() => { btn.textContent = 'SEND'; }, 2000);
      toast('Saved to triage.json');
    }
  } catch (e) { toast('Send failed: ' + e.message); }
}

async function build() {
  const btn = document.getElementById('build-btn');
  btn.disabled = true;
  btn.classList.add('running');
  btn.textContent = 'BUILDING…';

  try {
    const resp = await fetch('/api/build', { method: 'POST' });
    const result = await resp.json();
    if (result.ok) {
      btn.classList.remove('running');
      btn.classList.add('success');
      btn.textContent = 'BUILT ✓';
      toast(result.message || 'Site built');
      setTimeout(() => { btn.classList.remove('success'); btn.textContent = 'BUILD'; btn.disabled = false; }, 3000);
    } else {
      btn.classList.remove('running');
      btn.classList.add('error');
      btn.textContent = 'FAILED';
      toast(result.error || 'Build failed');
      setTimeout(() => { btn.classList.remove('error'); btn.textContent = 'BUILD'; btn.disabled = false; }, 5000);
    }
  } catch (e) {
    btn.classList.remove('running');
    btn.textContent = 'BUILD';
    btn.disabled = false;
    toast('Build error: ' + e.message);
  }
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

init();
</script>
